version: 2

models:
  - name: mart_melt_risk_shipments
    description: "Shipment-level melt risk, combining transit delay against product melt tolerance."
    columns:
      - name: shipment_id
        tests:
          - not_null
          - unique
      - name: melt_risk_level
        tests:
          - not_null
          - accepted_values:
              values:
                - 'LOW'
                - 'MEDIUM - delay approaching melt tolerance'
                - 'HIGH - delay exceeds melt tolerance'
                - 'CRITICAL - refrigeration failure'

  - name: mart_inventory_health
    description: "Current inventory snapshot combined with stock-out and cold-chain risk flags."
    columns:
      - name: product_id
        tests:
          - not_null
      - name: warehouse_id
        tests:
          - not_null
      - name: inventory_status
        tests:
          - not_null

  - name: mart_demand_trends
    description: "Daily aggregated demand per product/warehouse, feeds the forecast tool."
    columns:
      - name: order_date
        tests:
          - not_null
      - name: total_units_ordered
        tests:
          - not_null
